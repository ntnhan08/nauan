<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🌍 World Kitchen 3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04020a;--fh:'Baloo 2',cursive;--fb:'Nunito',sans-serif;
  --gold:#FFD700;--amber:#FF8C00;--cream:#FFE8CC;
  --panel:rgba(6,2,16,.94);--border:rgba(255,200,60,.13);
  --green:#00E676;--red:#FF1744;--blue:#40C4FF;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--cream);font-family:var(--fb)}
.screen{display:none;height:100dvh;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* ─── HOME ─── */
#home{background:radial-gradient(ellipse 80% 60% at 50% 20%,#1a0640 0%,#04020a 70%);
  align-items:center;justify-content:flex-start;padding:10px 14px;gap:10px;overflow-y:auto}
.home-hdr{text-align:center;padding:6px 0}
.globe-spin{font-size:3.2rem;display:inline-block;animation:globeSpin 6s linear infinite}
@keyframes globeSpin{to{transform:rotate(360deg)}}
.g-title{font-family:var(--fh);font-size:clamp(2rem,6vw,3.2rem);font-weight:800;
  background:linear-gradient(135deg,#FFD700 0%,#FF6B35 45%,#E040FB 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.05;
  filter:drop-shadow(0 0 16px #FF8C0040)}
.g-sub{font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:#9C27B055;margin-top:3px}
.region-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;width:100%;max-width:520px}
@media(min-width:480px){.region-grid{grid-template-columns:repeat(5,1fr)}}
.rgcard{background:linear-gradient(145deg,#0e0625,#08031a);border:1.5px solid var(--border);
  border-radius:14px;padding:10px 7px;text-align:center;cursor:pointer;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.rgcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,200,60,.04),transparent);pointer-events:none}
.rgcard:hover{transform:translateY(-3px) scale(1.02);border-color:rgba(255,200,60,.28);box-shadow:0 8px 24px rgba(160,80,255,.18)}
.rgcard:active{transform:scale(.93)}
.rgcard.locked{opacity:.35;cursor:not-allowed}
.rgcard.locked:hover{transform:none;box-shadow:none}
.rg-flag{font-size:1.8rem;display:block;margin-bottom:3px}
.rg-name{font-family:var(--fh);font-size:.68rem;color:var(--gold);font-weight:700}
.rg-best{font-size:.52rem;color:#ffffff33;margin-top:2px}
.rg-stars{font-size:.6rem;color:var(--amber);margin-top:1px}
.rg-lock{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;background:#00000066;border-radius:13px}
.home-tip{font-size:.56rem;color:#ffffff14;text-align:center;padding:4px}

/* ─── LEVEL SELECT ─── */
#levelSelect{background:radial-gradient(ellipse at 50% 0%,#220850,#04020a);
  align-items:center;padding:12px 14px;gap:10px;overflow-y:auto}
.ls-hdr{text-align:center;width:100%}
.ls-flag{font-size:2.8rem;display:block;animation:globeSpin 8s linear infinite}
.ls-name{font-family:var(--fh);font-size:1.5rem;color:var(--gold);font-weight:800}
.ls-desc{font-size:.6rem;color:#ffffff38;letter-spacing:2px;margin-top:2px;text-transform:uppercase}
.lv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%;max-width:520px}
@media(min-width:480px){.lv-grid{grid-template-columns:repeat(5,1fr)}}
.lv-card{background:#FF8C0007;border:1.5px solid var(--border);border-radius:11px;
  padding:10px 6px;text-align:center;cursor:pointer;transition:all .16s;position:relative;overflow:hidden}
.lv-card:hover:not(.locked){background:#FF8C0018;transform:translateY(-2px);border-color:#FF8C0030}
.lv-card.locked{opacity:.28;cursor:not-allowed}
.lv-card.done{border-color:#FFD70030;background:#FFD70009}
.lv-num{font-family:var(--fh);font-size:1.15rem;color:var(--gold);font-weight:800}
.lv-tg{font-size:.54rem;color:#FF8C0060;margin:2px 0}
.lv-st{font-size:.72rem}
.back-btn{background:#ffffff09;border:1px solid var(--border);color:var(--cream);
  border-radius:22px;padding:7px 20px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:var(--fb)}

/* ─── GAME ─── */
#game{position:relative;overflow:hidden;background:#04020a}
#gameCanvas{position:absolute;inset:0;width:100%;height:100%;display:block}

/* HUD bar */
.ghud{position:absolute;top:0;left:0;right:0;
  background:linear-gradient(180deg,rgba(4,2,10,.97) 0%,rgba(4,2,10,.0) 100%);
  display:flex;align-items:center;gap:5px;padding:6px 8px 14px;pointer-events:none;z-index:20}
.ghud-btn{pointer-events:all;background:#ffffff0d;border:1px solid var(--border);
  color:var(--cream);border-radius:7px;padding:4px 9px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:var(--fb)}
.ghud-lv{font-family:var(--fh);font-size:.78rem;color:var(--gold);font-weight:700;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ghud-mo{font-family:var(--fh);font-size:.82rem;color:#FFB300;font-weight:700;white-space:nowrap}
.ghud-tm{font-family:var(--fh);font-size:.82rem;font-weight:700;white-space:nowrap}
.ghud-tm.warn{color:var(--red);animation:blink .45s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.ghud-stars{font-size:.62rem;white-space:nowrap}

/* Status bar bottom */
.gstatus{position:absolute;bottom:0;left:0;right:0;height:42px;
  background:linear-gradient(0deg,rgba(4,2,10,.97) 0%,transparent 100%);
  display:flex;align-items:center;gap:7px;padding:0 10px 4px;z-index:20;pointer-events:none}
.chef-carry-icon{font-size:1.4rem;transition:all .2s;transform-origin:center}
.chef-carry-icon.has-item{animation:carryBob .8s ease-in-out infinite}
@keyframes carryBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.status-txt{font-size:.65rem;color:var(--cream);font-weight:700;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tap-hint{font-size:.56rem;color:#ffffff25;white-space:nowrap}

/* Recipe panel */
.rpanel{position:absolute;top:46px;left:0;bottom:46px;width:122px;
  background:var(--panel);border-right:1px solid var(--border);backdrop-filter:blur(4px);
  display:flex;flex-direction:column;z-index:15;transition:transform .22s ease}
.rpanel.closed{transform:translateX(-100%)}
.rpanel-hdr{font-size:.6rem;color:var(--amber);font-weight:700;padding:5px 7px;
  background:#FF8C000a;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:3px}
.rlist{flex:1;overflow-y:auto;padding:3px;display:flex;flex-direction:column;gap:3px}
.ritem{background:#FF8C0007;border:1.5px solid var(--border);border-radius:8px;
  padding:5px;cursor:pointer;transition:all .14s}
.ritem:hover{background:#FF8C0018;border-color:#FF8C0033}
.ritem.selected{border-color:var(--gold);background:#FFD70012}
.ritem:active{transform:scale(.92)}
.ri-e{font-size:1.35rem;display:block;text-align:center;margin-bottom:2px}
.ri-name{font-size:.54rem;font-weight:700;color:var(--cream);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-info{font-size:.48rem;color:#FF8C0055;text-align:center;margin-top:1px}
.ri-cooking{font-size:.44rem;color:var(--green);text-align:center;font-weight:700}
.ri-ings{display:flex;justify-content:center;gap:1px;margin-top:2px;flex-wrap:wrap}
.ri-ing-dot{font-size:.65rem}

/* Tab handles */
.rpanel-tab,.opanel-tab{position:absolute;top:50%;background:var(--panel);
  border:1px solid var(--border);padding:7px 3px;font-size:.56rem;cursor:pointer;
  z-index:16;writing-mode:vertical-lr;letter-spacing:1px;color:var(--cream);
  backdrop-filter:blur(4px);transition:all .22s}
.rpanel-tab{left:122px;transform:translateY(-50%);border-left:none;border-radius:0 7px 7px 0}
.rpanel-tab.closed{left:0}
.opanel-tab{right:110px;transform:translateY(-50%);border-right:none;border-radius:7px 0 0 7px}
.opanel-tab.closed{right:0}

/* Orders panel */
.opanel{position:absolute;top:46px;right:0;width:110px;max-height:55%;
  background:var(--panel);border-left:1px solid var(--border);backdrop-filter:blur(4px);
  z-index:15;transition:transform .22s ease;display:flex;flex-direction:column}
.opanel.closed{transform:translateX(100%)}
.opanel-hdr{font-size:.6rem;color:var(--blue);font-weight:700;padding:5px 7px;
  background:#40C4FF08;border-bottom:1px solid var(--border)}
.olist{flex:1;overflow-y:auto;padding:3px;display:flex;flex-direction:column;gap:3px}
.oitem{background:#40C4FF06;border:1px solid #40C4FF18;border-radius:6px;
  padding:4px 5px;cursor:pointer;display:flex;align-items:center;gap:3px}
.oitem:hover{background:#40C4FF10}
.oi-tb{font-size:.5rem;color:var(--blue);font-weight:700;width:16px;flex-shrink:0}
.oi-e{font-size:.9rem;flex-shrink:0}
.oi-body{flex:1;min-width:0}
.oi-nm{font-size:.48rem;color:var(--cream);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.oi-bw{height:3px;background:#ffffff0c;border-radius:2px;margin-top:2px;overflow:hidden}
.oi-bf{height:100%;border-radius:2px;transition:width .4s,background .4s}
.oi-bf.hi{background:linear-gradient(90deg,#00E676,#69F0AE)}
.oi-bf.md{background:linear-gradient(90deg,#FFB300,#FFD740)}
.oi-bf.lo{background:linear-gradient(90deg,#FF1744,#FF6D00)}
.no-orders{font-size:.56rem;color:#ffffff16;padding:8px;text-align:center}

/* Ingredient collection overlay */
.ing-overlay{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,rgba(10,4,24,.97),rgba(6,2,14,.97));
  border:1.5px solid var(--border);border-radius:16px;padding:10px 14px;
  z-index:30;min-width:220px;max-width:90vw;text-align:center;
  pointer-events:all;
  animation:overlayIn .22s cubic-bezier(.34,1.56,.64,1)}
@keyframes overlayIn{from{transform:translateX(-50%) scale(.8);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
.io-title{font-family:var(--fh);font-size:.85rem;color:var(--gold);font-weight:800;margin-bottom:8px}
.io-ing-row{display:flex;gap:7px;justify-content:center;margin-bottom:8px}
.io-ing{background:#FF8C0008;border:2px solid var(--border);border-radius:9px;
  padding:7px 8px;min-width:48px;text-align:center;cursor:pointer;transition:all .15s}
.io-ing:hover{background:#FF8C0018;transform:scale(1.07)}
.io-ing:active{transform:scale(.91)}
.io-ing.collected{border-color:var(--green);background:#00E67618;cursor:not-allowed}
.io-ing.next{border-color:var(--gold);background:#FFD70012;animation:ingPulse .7s infinite}
@keyframes ingPulse{0%,100%{box-shadow:0 0 0 0 #FFD70030}50%{box-shadow:0 0 0 5px #FFD70000}}
.io-ie{font-size:1.4rem;display:block}
.io-in{font-size:.48rem;color:var(--cream);margin-top:2px}
.io-hint{font-size:.56rem;color:#ffffff35;margin-top:4px}
.io-cancel{background:#FF17440c;border:1px solid #FF174425;color:#FF1744;
  border-radius:7px;padding:3px 10px;font-size:.58rem;cursor:pointer;font-family:var(--fb);margin-top:6px}

/* Cook button */
.cook-fab{position:absolute;bottom:50px;right:10px;
  background:linear-gradient(135deg,#E65100,#FF8C00);border:none;border-radius:50px;
  padding:8px 14px;color:#fff;font-family:var(--fb);font-weight:800;font-size:.72rem;
  cursor:pointer;z-index:25;box-shadow:0 3px 14px #FF8C0055;
  transition:all .18s;pointer-events:all;display:flex;align-items:center;gap:5px}
.cook-fab:hover{transform:scale(1.06);box-shadow:0 4px 18px #FF8C0077}
.cook-fab:active{transform:scale(.91)}
.cook-fab.hidden{display:none}
.cook-fab-icon{font-size:1rem}

/* FX */
.ftxt{position:fixed;pointer-events:none;z-index:9999;font-family:var(--fh);
  font-weight:800;font-size:.94rem;animation:ftxtUp 1.1s ease-out forwards;white-space:nowrap}
@keyframes ftxtUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-56px);opacity:0}}
.toast{position:fixed;bottom:54px;left:50%;transform:translateX(-50%) scale(0);
  background:linear-gradient(135deg,#12052c,#08021a);border:1px solid #9C27B044;
  border-radius:26px;padding:7px 18px;z-index:9998;font-family:var(--fh);
  color:var(--cream);font-size:.84rem;font-weight:700;box-shadow:0 3px 14px #00000066;
  pointer-events:none;transition:transform .2s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;max-width:88vw;text-align:center}
.toast.show{transform:translateX(-50%) scale(1)}
.cf{position:fixed;pointer-events:none;z-index:9997;animation:cfFall linear forwards}
@keyframes cfFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ─── RESULT ─── */
#result{background:radial-gradient(ellipse at 50% 30%,#1c0640,#04020a);
  align-items:center;justify-content:center;padding:14px}
.res-card{background:linear-gradient(155deg,rgba(22,8,44,.97),rgba(8,3,18,.97));
  border:1.5px solid #9C27B028;border-radius:22px;padding:clamp(14px,4vw,28px);
  text-align:center;max-width:360px;width:100%;
  box-shadow:0 0 44px #9C27B018;animation:resIn .45s cubic-bezier(.34,1.56,.64,1)}
@keyframes resIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.res-e{font-size:clamp(2.5rem,8vw,4.2rem);display:block;margin-bottom:5px}
.res-t{font-family:var(--fh);font-size:clamp(1.2rem,4vw,1.7rem);color:var(--gold);font-weight:800}
.res-s{font-size:1.5rem;margin:5px 0;letter-spacing:5px}
.res-m{font-family:var(--fh);font-size:1.9rem;color:#FFB300;font-weight:800}
.res-tg{font-size:.68rem;color:#ffffff38;margin-bottom:8px}
.res-st{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:8px 0}
.rs{background:#ffffff06;border:1px solid var(--border);border-radius:10px;padding:7px}
.rsv{font-family:var(--fh);font-size:1rem;color:#FFB300;font-weight:700}
.rsl{font-size:.55rem;color:#ffffff28}
.res-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.btn-nx{background:linear-gradient(135deg,#7B1FA2,#E040FB);border:none;border-radius:24px;
  padding:10px 22px;color:#fff;font-family:var(--fb);font-weight:800;font-size:.84rem;
  cursor:pointer;box-shadow:0 2px 12px #9C27B050}
.btn-hm{background:#ffffff09;border:1px solid var(--border);color:var(--cream);
  border-radius:24px;padding:10px 22px;font-family:var(--fb);font-weight:700;font-size:.84rem;cursor:pointer}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#ffffff12;border-radius:2px}
@media(max-width:380px){.rpanel{width:105px}.rpanel-tab{left:105px}}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-hdr">
    <span class="globe-spin">🌍</span>
    <div class="g-title">World Kitchen 3D</div>
    <div class="g-sub">Vòng Quanh Thế Giới · 100 Cấp Độ</div>
  </div>
  <div class="region-grid" id="regionGrid"></div>
  <div class="home-tip">🗺️ Chọn vùng bản đồ để bắt đầu hành trình ẩm thực</div>
</div>

<!-- LEVEL SELECT -->
<div class="screen" id="levelSelect">
  <div class="ls-hdr">
    <span class="ls-flag" id="lsFlag">🇻🇳</span>
    <div class="ls-name" id="lsName">Việt Nam</div>
    <div class="ls-desc" id="lsDesc">ẨM THỰC TRUYỀN THỐNG</div>
  </div>
  <div class="lv-grid" id="lvGrid"></div>
  <button class="back-btn" onclick="showScreen('home');renderHome()">← Bản đồ</button>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <canvas id="gameCanvas"></canvas>

  <!-- HUD top -->
  <div class="ghud">
    <button class="ghud-btn" onclick="confirmQuit()">✕</button>
    <span class="ghud-lv" id="hudLv">Màn 1</span>
    <span class="ghud-mo" id="hudMo">💰0đ</span>
    <span class="ghud-tm" id="hudTm">⏱3:00</span>
    <span class="ghud-stars" id="hudStars">⭐⭐⭐⭐⭐</span>
  </div>

  <!-- Recipe panel left -->
  <div class="rpanel" id="rPanel">
    <div class="rpanel-hdr">🍳 Thực đơn</div>
    <div class="rlist" id="rList"></div>
  </div>
  <div class="rpanel-tab" id="rTab" onclick="toggleRPanel()">📖 MENU</div>

  <!-- Orders panel right -->
  <div class="opanel" id="oPanel">
    <div class="opanel-hdr">📋 Đơn hàng</div>
    <div class="olist" id="oList"></div>
  </div>
  <div class="opanel-tab" id="oTab" onclick="toggleOPanel()">📋 ĐƠN</div>

  <!-- Ingredient collection UI (shown when at shelf) -->
  <div class="ing-overlay" id="ingOverlay" style="display:none">
    <div class="io-title" id="ioTitle">Lấy nguyên liệu</div>
    <div class="io-ing-row" id="ioIngRow"></div>
    <div class="io-hint">Nhấn từng nguyên liệu theo thứ tự</div>
    <button class="io-cancel" onclick="cancelIngredientPick()">✕ Hủy</button>
  </div>

  <!-- Cook FAB -->
  <button class="cook-fab hidden" id="cookBtn" onclick="startCookingFlow()">
    <span class="cook-fab-icon">🥬</span>Lấy nguyên liệu
  </button>

  <!-- Status bottom -->
  <div class="gstatus">
    <span class="chef-carry-icon" id="chefCarryIcon"></span>
    <span class="status-txt" id="statusTxt">Chọn món ăn → Bấm lấy nguyên liệu</span>
    <span class="tap-hint" id="tapHint">Nhấn sàn để đi</span>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="res-card">
    <span class="res-e" id="resE">🏆</span>
    <div class="res-t" id="resT"></div>
    <div class="res-s" id="resS"></div>
    <div class="res-m" id="resM"></div>
    <div class="res-tg" id="resTg"></div>
    <div class="res-st" id="resSt"></div>
    <div class="res-btns">
      <button class="btn-nx" id="btnNx" onclick="btnNxClick()">Màn tiếp →</button>
      <button class="btn-hm" onclick="goHome()">🗺️ Bản đồ</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
'use strict';
// ══════════════════════════════════════════════════════════════
// DATA — 10 REGIONS × 8 RECIPES EACH
// ══════════════════════════════════════════════════════════════
const REGIONS = [
  { id:1, flag:'🇻🇳', name:'Việt Nam', desc:'ẨM THỰC VIỆT', themeColor:0xFF6644,
    floorColor:'#2a0800', wallColor:0x1A0500,
    recipes:[
      {id:'ca_phe',   name:'Cà Phê',     e:'☕', t:3,  p:15, ings:[{e:'☕',n:'Cà Phê Hạt'},{e:'🥛',n:'Sữa Tươi'},{e:'🍬',n:'Đường'}]},
      {id:'banh_mi',  name:'Bánh Mì',    e:'🥖', t:5,  p:25, ings:[{e:'🥖',n:'Bánh Mì'},{e:'🥩',n:'Thịt Nguội'},{e:'🥬',n:'Rau Sống'}]},
      {id:'pho',      name:'Phở Bò',     e:'🍜', t:11, p:40, ings:[{e:'🦴',n:'Xương Bò'},{e:'🌿',n:'Rau Thơm'},{e:'🍜',n:'Bánh Phở'}]},
      {id:'com_tam',  name:'Cơm Tấm',    e:'🍚', t:9,  p:35, ings:[{e:'🍚',n:'Cơm Trắng'},{e:'🥓',n:'Sườn Nướng'},{e:'🍳',n:'Trứng Ốp'}]},
      {id:'bun_bo',   name:'Bún Bò',     e:'🥣', t:13, p:45, ings:[{e:'🥩',n:'Thịt Bò'},{e:'🌾',n:'Sả'},{e:'🥣',n:'Bún Tươi'}]},

// Build 10 levels per region
REGIONS.forEach(r=>{
  r.levels = Array.from({length:10},(_,i)=>{
    const n=i+1;
    return {
      id:n, regionId:r.id,
      tables: Math.min(4+Math.floor(n/2), 8),
      time: 170+n*14,
      target: Math.round(220*r.id*(1+i*0.38)),
      spawn: Math.max(2.5, 9-n*0.65),
      foodPatRate: 2.8+i*0.2,    // patience drain %/s while waiting for food
      queuePatRate: 8+i*0.4,     // patience drain %/s while waiting in queue
      recipeCount: Math.max(3, Math.min(2+Math.floor(n/1.5), r.recipes.length)),
      stoves: n>=6?3:2,
    };
  });
});

}

function onResize(){
  const w=innerWidth,h=innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}

function makeFloorTex(hex){
  const c=document.createElement('canvas'); c.width=c.height=256;
  const ctx=c.getContext('2d');
  ctx.fillStyle=hex; ctx.fillRect(0,0,256,256);
  // tile pattern
  ctx.fillStyle='rgba(255,255,255,0.035)';
  for(let i=0;i<8;i++) for(let j=0;j<8;j++)
    if((i+j)%2===0) ctx.fillRect(i*32,j*32,32,32);
  // grout lines
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
  for(let i=0;i<=8;i++){
    ctx.beginPath(); ctx.moveTo(i*32,0); ctx.lineTo(i*32,256); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*32); ctx.lineTo(256,i*32); ctx.stroke();
  }
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(5,5); return t;
}

// ══════════════════════════════════════════════════════════════
// SPRITE HELPERS
// ══════════════════════════════════════════════════════════════
function makeEmojiSprite(emoji,scale=0.6){
  const tex=getEmojiTex(emoji||'');
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true});
  const s=new THREE.Sprite(mat);
  s.scale.set(scale,scale,scale);
  return s;
}

function getEmojiTex(emoji){
  if(!emoji) emoji='';
  if(emojiCache[emoji]) return emojiCache[emoji];
  const c=document.createElement('canvas'); c.width=c.height=80;
  const ctx=c.getContext('2d');
  if(emoji){ ctx.font='60px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(emoji,40,44); }
  const t=new THREE.CanvasTexture(c);
  emojiCache[emoji]=t; return t;
}

function makeTextSprite(text,opts={}){
  const {bg='rgba(0,0,0,0.6)',fg='#FFD700',size=22}=opts;
  const c=document.createElement('canvas'); c.width=256; c.height=80;
  const ctx=c.getContext('2d');
  ctx.fillStyle=bg; ctx.roundRect(0,0,256,80,12); ctx.fill();
  ctx.fillStyle=fg; ctx.font=`bold ${size}px Nunito,sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text,128,40);
  const t=new THREE.CanvasTexture(c);
  const mat=new THREE.SpriteMaterial({map:t,transparent:true});
  const s=new THREE.Sprite(mat);
  return s;
}

function makePatBarSprite(){
  const c=document.createElement('canvas'); c.width=128; c.height=16;
  const t=new THREE.CanvasTexture(c);
  const mat=new THREE.SpriteMaterial({map:t,transparent:true,depthTest:false});
  const s=new THREE.Sprite(mat);
  s.scale.set(1.2,0.15,1);
  s.userData={patCanvas:c,patCtx:c.getContext('2d'),patTex:t};
  return s;
}

function updatePatBar(sprite,pct){
  if(!sprite||!sprite.userData.patCanvas) return;
  const {patCanvas:c,patCtx:ctx,patTex:t}=sprite.userData;
  ctx.clearRect(0,0,128,16);
  // bg
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.roundRect(2,2,124,12,6); ctx.fill();
  // fill
  const col=pct>60?'#00E676':pct>30?'#FFB300':'#FF1744';
  const grd=ctx.createLinearGradient(4,0,124,0);
  grd.addColorStop(0,col); grd.addColorStop(1,'rgba(255,255,255,0.5)');
  ctx.fillStyle=grd;
  ctx.roundRect(4,4,Math.max(1,(120*pct/100)),8,4); ctx.fill();
  t.needsUpdate=true;
}

function tablePositions(){
  const n=LV.tables;
  const cols=Math.min(n,3);
  const rows=Math.ceil(n/cols);
  const positions=[];
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    if(positions.length>=n) break;
    positions.push({
      x:(c-(cols-1)/2)*3.6,
      z:0.4+r*3.0-(rows-1)*1.2
    });
  }
  return positions;
}

// ══════════════════════════════════════════════════════════════
// COLLISION
// ══════════════════════════════════════════════════════════════
const CHEF_RADIUS=0.3;
function resolveMove(cx,cz,nx,nz){
  // Clamp to floor bounds
  nx=Math.max(-9.5,Math.min(9.5,nx));
  nz=Math.max(-5.5,Math.min(5.5,nz));
  // Check each obstacle
  for(const ob of obstacles){
    const minx=ob.cx-ob.hw-CHEF_RADIUS, maxx=ob.cx+ob.hw+CHEF_RADIUS;
    const minz=ob.cz-ob.hd-CHEF_RADIUS, maxz=ob.cz+ob.hd+CHEF_RADIUS;
    const inOldX=cx>minx&&cx<maxx, inOldZ=cz>minz&&cz<maxz;
    const inNewX=nx>minx&&nx<maxx, inNewZ=nz>minz&&nz<maxz;
    if(inNewX&&inNewZ){
      // Colliding — try sliding
      if(!inOldX) nx=cx; // block X
      if(!inOldZ) nz=cz; // block Z
      // If both blocked, stay put
    }
  }
  return {x:nx,z:nz};
}

function startGame(regionId,levelId){
  RG=REGIONS.find(r=>r.id===regionId);
  LV=RG.levels.find(l=>l.id===levelId);
  if(!RG||!LV) return;
  _curRegion=RG; // needed for result screen next-level
  if(!renderer) initThree();
  buildScene();
  G=mkState();
  chefGroup.position.set(0,0,G.chef.pos.z);
  // UI
  document.getElementById('hudLv').textContent=`${RG.flag} Màn ${LV.id} · ${RG.name}`;
  document.getElementById('cookBtn').classList.add('hidden');
  document.getElementById('ingOverlay').style.display='none';
  setStatus('Chọn món ăn → Bấm lấy nguyên liệu',false);
  renderRecipePanel(); renderOrderPanel();
  _rOpen=true; _oOpen=true;
  document.getElementById('rPanel').classList.remove('closed');
  document.getElementById('oPanel').classList.remove('closed');
  document.getElementById('rTab').classList.remove('closed');
  document.getElementById('oTab').classList.remove('closed');
  // Canvas events
  const cv=document.getElementById('gameCanvas');
  cv.removeEventListener('pointerup',onCanvasPointer);
  cv.addEventListener('pointerup',onCanvasPointer);
  showScreen('game');
  tip2(`${RG.flag} ${RG.name} · Màn ${LV.id} · Mục tiêu ${(LV.target/1000).toFixed(1)}K đ`);
  if(gameRAF) cancelAnimationFrame(gameRAF);
  clock.start();
  loop3D();
}

// ══════════════════════════════════════════════════════════════
// GAME LOOP
// ══════════════════════════════════════════════════════════════
function loop3D(){
  gameRAF=requestAnimationFrame(loop3D);
  const dt=Math.min(clock.getDelta(),0.1);
  if(G&&G.running) tick(dt);
  if(G) animateScene(dt);
  renderer.render(scene,camera);
}

function tick(dt){
  G.time-=dt;
  if(G.time<=0){G.time=0;endGame();return;}
  updateHUD();

  // Spawn
  G.spawnTimer-=dt;
  if(G.spawnTimer<=0){
    G.spawnTimer=LV.spawn+Math.random()*2.5;
    if(G.queue.length<5) spawnCustomer();
  }

  // Queue patience drain
  G.queue=G.queue.filter(c=>{
    c.seatPat-=dt*LV.queuePatRate;
    if(c.seatPat<=0){
      G.rep=Math.max(0,G.rep-0.3);
      G.stats.angry++;
      floatW(`${c.emoji}😤`,c.pos.x,c.pos.z,'#FF1744');
      playS('wrong');
      removeCustMesh(c.id);
      return false;
    }
    return true;
  });

  // Move / update customers
  G.customers.forEach(c=>{
    if(c.state==='walkingToTable'){
      const tp=tableMeshData[c.tableId]?.pos||{x:0,z:0};
      const dx=tp.x-c.pos.x, dz=tp.z-c.pos.z;
      const d=Math.hypot(dx,dz);
      if(d>0.12){
        c.pos.x+=dx/d*CUST_SPEED*dt;
        c.pos.z+=dz/d*CUST_SPEED*dt;
      } else {
        c.pos.x=tp.x; c.pos.z=tp.z; c.state='seated';
        const tbl=G.tables[c.tableId];
        tbl.state='occupied'; tbl.cust=c;
        const recs=RG.recipes.slice(0,LV.recipeCount);
        tbl.order=recs[Math.floor(Math.random()*recs.length)];
        tbl.patience=100; G.stats.seated++;
        floatW('😊',tp.x,tp.z-0.6,'#00E676');
        // Show order emoji above table
        updateTableIndicator(c.tableId);
        renderOrderPanel();
        // Show order emoji as sprite above table
        const td=tableMeshData[c.tableId];
        if(td&&tbl.order){
          const os=makeEmojiSprite(tbl.order.e,0.7);
          os.position.set(0,2.5,0);
          os.userData={type:'orderSprite',tableId:c.tableId};
          td.group.add(os);
          td.orderSprite=os;
        }
      }
    } else if(c.state==='leaving'){
      const tx=c.leaveTarget.x, tz=c.leaveTarget.z;
      c.pos.x+=(tx-c.pos.x)*dt*3.5;
      c.pos.z+=(tz-c.pos.z)*dt*3.5;
      if(Math.hypot(tx-c.pos.x,tz-c.pos.z)<0.25){
        removeCustMesh(c.id); c.done=true;
      }
    }
  });
  G.customers=G.customers.filter(c=>!c.done);

  // Table states
  G.tables.forEach((t,ti)=>{
    if(t.state==='occupied'&&t.order){
      t.patience-=dt*LV.foodPatRate;
      const td=tableMeshData[ti];
      if(td&&td.patBarSprite){
        td.patBarSprite.visible=true;
        updatePatBar(td.patBarSprite,Math.max(0,t.patience));
      }
      if(t.patience<=0){
        t.patience=0; G.rep=Math.max(0,G.rep-0.4); G.stats.angry++;
        floatW('😡',tableMeshData[ti]?.pos.x||0,tableMeshData[ti]?.pos.z||0,'#FF1744');
        playS('wrong');
        makeLeave(ti); clearTable(ti); renderOrderPanel();
      }
    } else {
      const td=tableMeshData[ti];
      if(td&&td.patBarSprite) td.patBarSprite.visible=false;
    }
    if(t.state==='eating'){
      t.eatTimer-=dt;
      if(t.eatTimer<=0){
        t.state='paying'; t.payReady=true;
        updateTableIndicator(ti);
        floatW('💰',tableMeshData[ti]?.pos.x||0,tableMeshData[ti]?.pos.z||0,'#FFD700');
        playS('ding');
      }
    }
    if(t.state==='dirtyWait'){
      t.dirtyTimer=(t.dirtyTimer||2.5)-dt;
      if(t.dirtyTimer<=0) clearTable(ti);
    }
  });

  // Stove cooking
  G.stoves.forEach((s,si)=>{
    if(s.busy&&!s.done){
      s.prog+=dt/s.cookTime*100;
      if(s.prog>=100){
        s.prog=100; s.done=true;
        playS('ding');
        floatStove(si,'✅');
        if(stoveEmojiSprites[si]) stoveEmojiSprites[si].visible=true;
      }
      if(stoveRings[si]){
        stoveRings[si].mat.emissiveIntensity=s.prog/100*1.4;
        stoveRings[si].mat.color.setHex(s.done?0x00E676:0xFF4400);
        stoveRings[si].mat.emissive.setHex(s.done?0x00AA44:0xFF2200);
      }
      if(stoveLights[si]) stoveLights[si].intensity=s.busy?(0.3+Math.sin(Date.now()*0.007)*0.15):0;
      if(stoveLights[si]) stoveLights[si].color.setHex(s.done?0x00FF44:0xFF6600);
    }
  });

  // Chef movement with collision
  moveChef(dt);

  // Sync customer 3D positions + queue patience bar
  [...G.queue,...G.customers].forEach(c=>{
    const m=custMeshMap[c.id];
    if(!m) return;
    m.group.position.set(c.pos.x,0,c.pos.z);
    if(c.state==='walking'||c.state==='walkingToTable'||c.state==='leaving'){
      m.group.position.y=Math.abs(Math.sin(Date.now()*0.014*c.bf))*0.07;
    } else {
      m.group.position.y=0;
    }
    // Update queue patience bar above customer head
    if(c.seatPat!==undefined && m.patSprite){
      updatePatBar(m.patSprite,Math.max(0,c.seatPat));
      m.patSprite.visible=true;
    }
    if(c.state==='seated'&&m.patSprite) m.patSprite.visible=false;
  });
}

function moveChef(dt){
  const chef=G.chef;
  if(!chef.target) return;
  const dx=chef.target.x-chef.pos.x;
  const dz=chef.target.z-chef.pos.z;
  const dist=Math.hypot(dx,dz);
  if(dist>0.08){
    const spd=CHEF_SPEED*dt;
    let nx=chef.pos.x+dx/dist*spd;
    let nz=chef.pos.z+dz/dist*spd;
    // Only apply obstacle collision for manual floor clicks, not scripted walks
    if(!chef.skipCol){
      const res=resolveMove(chef.pos.x,chef.pos.z,nx,nz);
      nx=res.x; nz=res.z;
    } else {
      // Scripted walk: boundary clamp only
      nx=Math.max(-9.8,Math.min(9.8,nx));
      nz=Math.max(-6.5,Math.min(7.5,nz));
    }
    chef.pos.x=nx; chef.pos.z=nz;
    chefGroup.position.x=nx; chefGroup.position.z=nz;
    chefGroup.position.y=Math.abs(Math.sin(Date.now()*0.013))*0.08;
    chefGroup.rotation.y=Math.atan2(dx,dz);
  } else {
    chef.pos.x=chef.target.x; chef.pos.z=chef.target.z;
    chefGroup.position.x=chef.pos.x; chefGroup.position.z=chef.pos.z;
    chefGroup.position.y=0; chef.target=null; chef.skipCol=false;
    onChefArrive();
  }
}

function onChefArrive(){
  const cb=G.chef.afterArrive;
  G.chef.afterArrive=null;
  if(cb) cb();
}

function walkChef(tx,tz,cb,skipCollision=false){
  G.chef.target={x:tx,z:tz};
  G.chef.afterArrive=cb||null;
  G.chef.state='walk';
  G.chef.skipCol=skipCollision; // programmatic walks skip obstacle collision
}

// ══════════════════════════════════════════════════════════════
// INGREDIENT COLLECTION FLOW
// ══════════════════════════════════════════════════════════════
function startCookingFlow(){
  const rec=G.selectedRecipe;
  if(!rec){ tip2('⚠️ Chọn món ăn trước!'); return; }
  if(G.chef.carry){ tip2('⚠️ Bê món ra bàn trước!'); return; }
  if(findFreeStove()===-1){ tip2('⚠️ Bếp đang bận — chờ nấu xong!'); return; }
  const busyStates=['walkToShelf','atShelf','collecting','hasIngredients','walk'];
  // Allow starting from idle only (walk would mean another task is in progress)
  if(G.chef.state!=='idle'&&G.chef.state!=='carrying'){
    // If just walking freely (manual walk with no callback), allow it
    if(!(G.chef.state==='walk' && !G.chef.afterArrive)){
      tip2('Chef đang bận!'); return;
    }
  }
  document.getElementById('cookBtn').classList.add('hidden');
  // Walk to shelf area
  G.chef.state='walkToShelf';
  setStatus(`🚶 Đang đến lấy nguyên liệu cho ${rec.name}...`);
  walkChef(0, 5.4, ()=>arriveAtShelf(rec), true);
}

function arriveAtShelf(rec){
  G.chef.state='atShelf';
  G.chef.collectTarget=rec;
  G.chef.collectStep=0;
  showIngredientOverlay(rec);
  setStatus(`🥬 Lấy nguyên liệu: ${rec.name}`);
}

function showIngredientOverlay(rec){
  document.getElementById('ioTitle').textContent=`🥬 Lấy nguyên liệu: ${rec.name} ${rec.e}`;
  const row=document.getElementById('ioIngRow');
  row.innerHTML=rec.ings.map((ing,i)=>`
    <div class="io-ing ${i===0?'next':''}" id="ing_${i}" onclick="collectIngredient(${i})">
      <span class="io-ie">${ing.e}</span>
      <div class="io-in">${ing.n}</div>
    </div>`).join('');
  document.getElementById('ingOverlay').style.display='block';
}

function collectIngredient(idx){
  const chef=G.chef;
  if(chef.state!=='atShelf'||chef.collectStep!==idx) return;
  const rec=chef.collectTarget;
  if(!rec) return;
  playS('click');
  // Mark as collected
  const el=document.getElementById(`ing_${idx}`);
  if(el){ el.classList.remove('next'); el.classList.add('collected'); el.textContent=`✅ ${rec.ings[idx].e}`; }
  // Float ingredient
  floatW(rec.ings[idx].e,chef.pos.x,chef.pos.z,'#FFD700');
  chef.collectStep++;
  // Highlight next
  if(chef.collectStep<rec.ings.length){
    const next=document.getElementById(`ing_${chef.collectStep}`);
    if(next){ next.classList.add('next'); }
    setStatus(`✓ ${idx+1}/${rec.ings.length} · Lấy tiếp: ${rec.ings[chef.collectStep].n}`);
  } else {
    // All collected!
    setTimeout(()=>{
      document.getElementById('ingOverlay').style.display='none';
      finishCollecting(rec);
    },400);
  }
}

function cancelIngredientPick(){
  document.getElementById('ingOverlay').style.display='none';
  G.chef.state='idle'; G.chef.collectTarget=null; G.chef.collectStep=0;
  setStatus('❌ Hủy. Chọn món và thử lại.');
  document.getElementById('cookBtn').classList.remove('hidden');
}

function finishCollecting(rec){
  G.chef.state='hasIngredients';
  const carrySprite=chefGroup.children.find(c=>c.userData.type==='carrySprite');
  if(carrySprite){
    carrySprite.material.map=getEmojiTex(rec.e);
    carrySprite.material.needsUpdate=true;
    carrySprite.visible=true;
  }
  document.getElementById('chefCarryIcon').textContent=rec.ings.map(i=>i.e).join('');
  document.getElementById('chefCarryIcon').classList.add('has-item');
  setStatus(`📦 Đủ nguyên liệu ${rec.name} · Đang đến bếp...`);
  // Walk to free stove
  const sid=findFreeStove();
  if(sid===-1){ tip2('⚠️ Bếp đầy!'); G.chef.state='idle'; return; }
  const sp=stationData.find(s=>s.type==='stove'&&s.id===sid);
  const tx=sp?.pos.x||0, tz=(sp?.pos.z||5.2)-1.0;
  walkChef(tx,tz,()=>depositToStove(sid,rec),true);
}

function depositToStove(sid,rec){
  const stove=G.stoves[sid];
  stove.busy=true; stove.done=false; stove.prog=0;
  stove.cookTime=rec.cookTime; stove.recipe=rec;
  G.chef.state='idle'; G.chef.collectTarget=null; G.chef.collectStep=0;
  G.selectedRecipe=null;
  const carrySprite=chefGroup.children.find(c=>c.userData.type==='carrySprite');
  if(carrySprite){ carrySprite.visible=false; }
  document.getElementById('chefCarryIcon').textContent='';
  document.getElementById('chefCarryIcon').classList.remove('has-item');
  // Update stove emoji
  if(stoveEmojiSprites[sid]){
    stoveEmojiSprites[sid].material.map=getEmojiTex(rec.e);
    stoveEmojiSprites[sid].material.needsUpdate=true;
    stoveEmojiSprites[sid].visible=true;
  }
  if(stoveLights[sid]) stoveLights[sid].intensity=0.3;
  setStatus(`🍳 Đang nấu ${rec.name} (${rec.cookTime}s) · Nhấn bếp khi xong để lấy`);
  playS('click');
  renderRecipePanel();
  document.getElementById('cookBtn').classList.add('hidden');
}

function pickupFromStove(sid){
  const stove=G.stoves[sid];
  if(!stove.done){ tip2('⏳ Chưa nấu xong!'); return; }
  if(G.chef.carry){ tip2('⚠️ Đang cầm món — bê ra bàn trước!'); return; }
  G.chef.carry={recipe:stove.recipe};
  const carrySprite=chefGroup.children.find(c=>c.userData.type==='carrySprite');
  if(carrySprite){
    carrySprite.material.map=getEmojiTex(stove.recipe.e);
    carrySprite.material.needsUpdate=true;
    carrySprite.visible=true;
  }
  document.getElementById('chefCarryIcon').textContent=stove.recipe.e;
  document.getElementById('chefCarryIcon').classList.add('has-item');
  stove.busy=false; stove.done=false; stove.prog=0; stove.recipe=null;
  if(stoveEmojiSprites[sid]) stoveEmojiSprites[sid].visible=false;
  if(stoveLights[sid]) stoveLights[sid].intensity=0;
  if(stoveRings[sid]){ stoveRings[sid].mat.emissiveIntensity=0; stoveRings[sid].mat.color.setHex(0xFF4400); }
  G.chef.state='carrying';
  setStatus(`🫱 Cầm ${G.chef.carry.recipe.name} · Nhấn bàn khách có đơn để phục vụ`);
  playS('coin');
  renderRecipePanel();
}

function serveTable(tid){
  const t=G.tables[tid];
  const carry=G.chef.carry;
  if(!carry){ tip2('Không cầm gì!'); return; }
  if(t.state!=='occupied'||!t.order){ tip2('Bàn không có đơn!'); return; }
  if(t.order.id!==carry.recipe.id){
    tip2(`❌ Sai! Khách muốn ${t.order.name} ${t.order.e}`);
    G.rep=Math.max(0,G.rep-0.15); playS('wrong'); return;
  }
  const pat=t.patience/100;
  const tip=pat>0.7?1.35:pat>0.4?1.12:1.0;
  const earned=Math.round(t.order.price*tip);
  G.money+=earned; G.stats.served++; G.stats.tip+=earned-t.order.price;
  t.state='eating'; t.eatTimer=5+Math.random()*4; t.order=null; t.patience=100;
  // Remove order sprite
  const td=tableMeshData[tid];
  if(td&&td.orderSprite){ td.group.remove(td.orderSprite); td.orderSprite=null; }
  if(td&&td.patBarSprite) td.patBarSprite.visible=false;
  updateTableIndicator(tid);
  G.chef.carry=null;
  const carrySprite=chefGroup.children.find(c=>c.userData.type==='carrySprite');
  if(carrySprite) carrySprite.visible=false;
  document.getElementById('chefCarryIcon').textContent='';
  document.getElementById('chefCarryIcon').classList.remove('has-item');
  G.chef.state='idle';
  floatW(`+${earned}đ${tip>1?` 🌟`:''}`,tableMeshData[tid]?.pos.x||0,(tableMeshData[tid]?.pos.z||0)-0.6,'#FFD700');
  setStatus(`✅ Phục vụ! +${earned}đ · Chọn món tiếp`);
  playS('coin');
  renderOrderPanel();
  renderRecipePanel();
  // Re-show cookBtn if recipe still selected and stove available
  if(G.selectedRecipe && findFreeStove()!==-1){
    document.getElementById('cookBtn').classList.remove('hidden');
  } else {
    document.getElementById('cookBtn').classList.add('hidden');
  }
}

function collectPayment(tid){
  const t=G.tables[tid];
  if(!t.payReady) return;
  const tip=Math.round(10+Math.random()*15);
  G.money+=tip; G.stats.tip+=tip;
  floatW(`💰+${tip}đ`,tableMeshData[tid]?.pos.x||0,(tableMeshData[tid]?.pos.z||0)-0.5,'#FFD700');
  playS('coin');
  makeLeave(tid);
  t.state='dirtyWait'; t.dirtyTimer=2.5; t.payReady=false; t.cust=null;
  const td=tableMeshData[tid];
  if(td&&td.orderSprite){ td.group.remove(td.orderSprite); td.orderSprite=null; }
  updateTableIndicator(tid);
  haptic([25,15,25]);
}

function makeLeave(tid){
  const t=G.tables[tid];
  const c=t.cust; if(!c) return;
  c.state='leaving'; c.leaveTarget={x:(Math.random()-.5)*2,z:-6.5};
  t.cust=null;
}

function clearTable(tid){
  const t=G.tables[tid];
  t.state='empty'; t.cust=null; t.order=null; t.patience=100; t.payReady=false;
  const td=tableMeshData[tid];
  if(td&&td.orderSprite){ td.group.remove(td.orderSprite); td.orderSprite=null; }
  if(td&&td.patBarSprite) td.patBarSprite.visible=false;
  updateTableIndicator(tid);
}

function findFreeStove(){
  for(let i=0;i<G.stoves.length;i++) if(!G.stoves[i].busy) return i;
  return -1;
}

let _custId=0;
function spawnCustomer(){
  const id=++_custId;
  const slot=G.queue.length;
  const qx=(slot-2)*1.3;
  const emojis=['👨','👩','👴','👵','🧑','👱','🧕','👦'];
  const cust={
    id,emoji:emojis[id%emojis.length],
    colorIdx:id%CUST_COLORS.length,skinIdx:id%CUST_SKINS.length,
    seatPat:100, pos:{x:qx,z:-4.8},
    state:'waiting',tableId:null,bf:0.7+Math.random()*0.5,
  };
  G.queue.push(cust);
  // Create 3D mesh
  const g=new THREE.Group();
  const col=CUST_COLORS[cust.colorIdx];
  const skin=CUST_SKINS[cust.skinIdx];
  const bodyMat=new THREE.MeshPhongMaterial({color:col,shininess:20});
  const body=new THREE.Mesh(new THREE.CylinderGeometry(0.19,0.21,0.68,9),bodyMat);
  body.position.y=0.34; g.add(body);
  const headMat=new THREE.MeshPhongMaterial({color:skin,shininess:20});
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.21,10,10),headMat);
  head.position.y=0.85; g.add(head);
  // Eyes
  const eyeM=new THREE.MeshBasicMaterial({color:0x111111});
  [[-0.07,0.89,0.18],[0.07,0.89,0.18]].forEach(([ex,ey,ez])=>{
    const eye=new THREE.Mesh(new THREE.SphereGeometry(0.025,6,6),eyeM);
    eye.position.set(ex,ey,ez); g.add(eye);
  });
  // Hair (colored based on customer)
  const hairMat=new THREE.MeshLambertMaterial({color:col});
  const hair=new THREE.Mesh(new THREE.SphereGeometry(0.215,10,6,[0,Math.PI*2,0,Math.PI*.6]),hairMat);
  hair.position.y=0.95; g.add(hair);
  // Outfit detail
  const acc=new THREE.Mesh(new THREE.BoxGeometry(0.26,0.08,0.06),
    new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:0.3}));
  acc.position.set(0,0.48,0.2); g.add(acc);
  // Patience bar above head
  const patSprite=makePatBarSprite();
  patSprite.position.y=1.4; patSprite.visible=true;
  g.add(patSprite);
  g.castShadow=true;
  g.userData={type:'customer',custId:id};
  g.position.set(qx,0,-4.8);
  scene.add(g);
  custMeshMap[id]={group:g,patSprite};
  playS('click');
}

function removeCustMesh(id){
  if(custMeshMap[id]){ scene.remove(custMeshMap[id].group); delete custMeshMap[id]; }
}

function seatCustomer(custId){
  const idx=G.queue.findIndex(c=>c.id===custId);
  if(idx===-1) return;
  const freeT=G.tables.findIndex(t=>t.state==='empty');
  if(freeT===-1){ tip2('⚠️ Không còn bàn trống!'); return; }
  const c=G.queue.splice(idx,1)[0];
  c.state='walkingToTable'; c.tableId=freeT;
  G.tables[freeT].state='reserved';
  G.customers.push(c);
  setStatus(`🚶 ${c.emoji} đang đến bàn ${freeT+1}...`);
  playS('ding'); haptic([15]);
  // Reposition remaining queue
  G.queue.forEach((qc,qi)=>{ qc.pos.x=(qi-2)*1.3; });
}

function updateTableIndicator(tid){

// ANIMATIONS (non-game)
// ══════════════════════════════════════════════════════════════
function animateScene(dt){
  const t=Date.now()*0.001;
  // Stove pulse when done
  G?.stoves?.forEach((s,i)=>{
    if(stoveLights[i]){
      if(s.done) stoveLights[i].intensity=0.4+Math.sin(t*6)*0.25;
      else if(s.busy) stoveLights[i].intensity=0.2+Math.sin(t*3)*0.1;
    }
    // Bounce stove emoji when done
    if(stoveEmojiSprites[i]&&s.done){
      stoveEmojiSprites[i].position.y=2.1+Math.sin(t*4)*0.1;
    }
  });
  // Paying table pulse
  G?.tables?.forEach((t2,i)=>{
    const td=tableMeshData[i];
    if(td&&t2.payReady){
      const v=0.6+Math.sin(t*5)*0.6;
      td.statusBall.material.emissiveIntensity=v;
    }
  });
  // Chef idle sway
  if(G?.chef?.state==='idle'&&chefGroup){
    chefGroup.rotation.z=Math.sin(t*1.5)*0.02;
  }
  // Chef arm raise when carrying
  if(chefGroup){
    chefGroup.children.forEach(c=>{
      if(c.userData?.armTag==='L') c.rotation.z=G?.chef?.carry?0.7:0.35;
      if(c.userData?.armTag==='R') c.rotation.z=G?.chef?.carry?-0.7:-0.35;
    });
  }
}

// ══════════════════════════════════════════════════════════════
// RAYCAST / INPUT
// ══════════════════════════════════════════════════════════════
const _ray=new THREE.Raycaster(), _mouse=new THREE.Vector2();

function onCanvasPointer(e){
  e.preventDefault();
  const r=renderer.domElement.getBoundingClientRect();
  const cx=e.changedTouches?e.changedTouches[0].clientX:e.clientX;
  const cy=e.changedTouches?e.changedTouches[0].clientY:e.clientY;
  _mouse.x=((cx-r.left)/r.width)*2-1;
  _mouse.y=-((cy-r.top)/r.height)*2+1;
  _ray.setFromCamera(_mouse,camera);

  if(!G||!G.running) return;

  // Gather all clickable objects
  const clickables=[];
  scene.children.forEach(obj=>{ if(obj.userData?.type) clickables.push(obj); });
  // Also customer groups
  Object.values(custMeshMap).forEach(m=>clickables.push(m.group));

  const hits=_ray.intersectObjects(clickables,true);
  for(const hit of hits){
    let o=hit.object;
    while(o&&!o.userData?.type&&o.parent) o=o.parent;
    if(!o||!o.userData?.type) continue;
    const ud=o.userData;
    if(ud.type==='customer'){
      const c=G.queue.find(q=>q.id===ud.custId)||G.customers.find(q=>q.id===ud.custId);
      if(c&&c.state==='waiting'){ seatCustomer(c.id); return; }
      continue;
    }
    if(ud.type==='table'){ handleTableTap(ud.id); return; }
    if(ud.type==='stove'){ handleStoveTap(ud.id); return; }
    if(ud.type==='shelf'||ud.type==='ingspot'){
      // Walk chef toward shelf
      if(G.chef.state==='atShelf') return; // already there
      if(!G.selectedRecipe){ tip2('Chọn món trước!'); return; }
      if(G.chef.carry){ tip2('⚠️ Bê món ra bàn trước!'); return; }
      startCookingFlow(); return;
    }
    if(ud.type==='floor') break;
  }

  // Floor walk - only when chef is free or carrying
  const fhit=_ray.intersectObject(floorMesh);
  if(fhit.length>0){
    const pt=fhit[0].point;
    const cs=G.chef.state;
    // Block floor movement when chef is in scripted activities
    const blocked=['atShelf','collecting','walkToShelf','hasIngredients'];
    if(!blocked.includes(cs)){
      G.chef.target={x:Math.max(-9,Math.min(9,pt.x)),z:Math.max(-5.2,Math.min(5.0,pt.z))};
      G.chef.afterArrive=null;
      G.chef.state='walk';
      G.chef.skipCol=false; // manual walks use collision
    } else if(cs==='atShelf'){
      tip2('🥬 Đang lấy nguyên liệu — nhấn từng ô!');
    }
  }
}

function handleTableTap(tid){
  const t=G.tables[tid];
  const td=tableMeshData[tid];
  const pos=td?.pos||{x:0,z:0};
  if(t.payReady){
    const tz=pos.z+1.3;
    walkChef(pos.x,tz,()=>collectPayment(tid),true);
    setStatus(`💰 Đến thu tiền bàn ${tid+1}...`);
    return;
  }
  if(t.state==='dirtyWait'||t.state==='dirty'){
    walkChef(pos.x,pos.z+1.3,()=>{ clearTable(tid); setStatus('🧹 Dọn bàn xong!'); },true);
    return;
  }
  if(t.state==='occupied'&&G.chef.carry){
    walkChef(pos.x,pos.z+1.3,()=>serveTable(tid),true);
    setStatus(`🍽️ Đến phục vụ bàn ${tid+1}...`);
    return;
  }
  if(t.state==='occupied'&&t.order){
    tip2(`B${tid+1}: Chờ ${t.order.name} ${t.order.e} (${Math.round(t.patience)}%)`);
  }
}

function handleStoveTap(sid){
  const s=G.stoves[sid];
  const sp=stationData.find(st=>st.type==='stove'&&st.id===sid);
  const tx=sp?.pos.x||0, tz=(sp?.pos.z||5.2)-1.0;
  if(s.done){
    walkChef(tx,tz,()=>pickupFromStove(sid),true);
    setStatus(`🫱 Đến lấy món từ bếp ${sid+1}...`);
  } else if(s.busy){
    tip2(`🍳 Bếp ${sid+1}: ${s.recipe?.name} ${Math.round(s.prog)}%`);
  } else {
    tip2(`Bếp ${sid+1} trống. Chọn món → Lấy nguyên liệu`);
  }
}

function floatW(txt,wx,wz,color='#FFD700'){
  const v=new THREE.Vector3(wx,2.8,wz); v.project(camera);
  const x=(v.x*.5+.5)*innerWidth, y=(-.5*v.y+.5)*innerHeight;
  const d=document.createElement('div'); d.className='ftxt'; d.textContent=txt;
  d.style.cssText=`color:${color};left:${x-16}px;top:${y-20}px`;
  document.body.appendChild(d); setTimeout(()=>d.remove(),1100);
}

function floatStove(sid,text){
  const sp=stationData.find(s=>s.type==='stove'&&s.id===sid)?.pos||{x:0,z:5.2};
  floatW(text,sp.x,sp.z-1,'#FFD700');
}

// END GAME
// ══════════════════════════════════════════════════════════════
function endGame(){
  if(!G||!G.running) return;
  G.running=false;
  if(gameRAF){cancelAnimationFrame(gameRAF);gameRAF=null;}
  const key=`${RG.id}_${LV.id}`;
  if(!scores[key]||G.money>scores[key]) scores[key]=G.money;
  const bk=`${RG.id}_best`;
  if(!scores[bk]||G.money>scores[bk]) scores[bk]=G.money;
  const win=G.money>=LV.target;
  if(win){
    scores[`${RG.id}_unlock`]=1;
    // Unlock next level in region
    if(LV.id>=10 && REGIONS.find(r=>r.id===RG.id+1)) scores[`${RG.id+1}_unlock`]=1; // allow next region if beat all 10
  }
  save();
  const stars=G.money>=LV.target*1.4?3:win?2:G.money>=LV.target*.5?1:0;
  const [msg,emoji]=win?(stars===3?['🏆 Xuất Sắc!','🎊']:['🎉 Hoàn Thành!','✨']):['😅 Chưa đủ tiền','💸'];
  document.getElementById('resE').textContent=emoji;
  document.getElementById('resT').textContent=msg;
  document.getElementById('resS').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('resM').textContent=G.money.toLocaleString()+'đ';
  document.getElementById('resTg').textContent=`Mục tiêu: ${LV.target.toLocaleString()}đ · ${RG.flag} ${RG.name}`;
  document.getElementById('resSt').innerHTML=`
    <div class="rs"><div class="rsv">🪑${G.stats.seated}</div><div class="rsl">Đã nhận</div></div>
    <div class="rs"><div class="rsv">🍽️${G.stats.served}</div><div class="rsl">Phục vụ</div></div>
    <div class="rs"><div class="rsv">💰${G.stats.tip}đ</div><div class="rsl">Tiền tip</div></div>
    <div class="rs"><div class="rsv">😤${G.stats.angry}</div><div class="rsl">Bỏ đi</div></div>`;
  const nxtLv=_curRegion?.levels?.find(l=>l.id===LV.id+1);
  const nxtRg=REGIONS.find(r=>r.id===RG.id+1);
  const btn=document.getElementById('btnNx');
  if(nxtLv&&win){ btn.style.display=''; _nxtFn=()=>startGame(RG.id,nxtLv.id); btn.textContent=`Màn ${nxtLv.id} →`; }
  else if(!nxtLv&&win&&nxtRg){ btn.style.display=''; _nxtFn=()=>{ openRegion(nxtRg.id); }; btn.textContent=`${nxtRg.flag} →`; }
  else btn.style.display='none';
  showScreen('result');
  if(win){confetti();playS('win');haptic([48,28,48,28,95]);}else playS('wrong');
}

let _nxtFn=null;
function btnNxClick(){ if(_nxtFn) _nxtFn(); }

function goHome(){
  if(gameRAF){cancelAnimationFrame(gameRAF);gameRAF=null;}
  if(G) G.running=false;
  document.getElementById('ingOverlay').style.display='none';
  showScreen('home'); renderHome();
}

function confirmQuit(){
  if(confirm('Thoát màn? Tiến độ sẽ mất!')) goHome();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ══════════════════════════════════════════════════════════════
// EFFECTS
// ══════════════════════════════════════════════════════════════
let _toastT;
function tip2(txt){
  const el=document.getElementById('toast'); el.textContent=txt; el.classList.add('show');
  clearTimeout(_toastT); _toastT=setTimeout(()=>el.classList.remove('show'),2500);
}

function confetti(){
  ['🎉','✨','💰','⭐','🏆','🎊','🥳'].forEach(ch=>{
    for(let i=0;i<4;i++) setTimeout(()=>{
      const d=document.createElement('div'); d.className='cf'; d.textContent=ch;
      const dur=2+Math.random()*2.2;
      d.style.cssText=`left:${Math.random()*100}vw;font-size:${.9+Math.random()*.7}rem;animation-duration:${dur}s`;
      document.body.appendChild(d); setTimeout(()=>d.remove(),(dur+.1)*1000);
    },i*60+Math.random()*200);
  });
}

// ══════════════════════════════════════════════════════════════
// SOUND
// ══════════════════════════════════════════════════════════════
let _ac=null;
function gC(){ if(!_ac){try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return _ac; }
function playS(t){
  const c=gC(); if(!c) return;
  try{
    const o=c.createOscillator(),g=c.createGain(); o.connect(g); g.connect(c.destination);
    const n=c.currentTime;
    if(t==='coin'){o.frequency.setValueAtTime(880,n);o.frequency.setValueAtTime(1100,n+.06);o.frequency.setValueAtTime(1320,n+.12);g.gain.setValueAtTime(.13,n);g.gain.exponentialRampToValueAtTime(.001,n+.28);o.start(n);o.stop(n+.28);}
    else if(t==='ding'){o.frequency.setValueAtTime(1200,n);g.gain.setValueAtTime(.09,n);g.gain.exponentialRampToValueAtTime(.001,n+.36);o.start(n);o.stop(n+.36);}
    else if(t==='wrong'){o.type='sawtooth';o.frequency.setValueAtTime(220,n);o.frequency.setValueAtTime(155,n+.09);g.gain.setValueAtTime(.08,n);g.gain.exponentialRampToValueAtTime(.001,n+.22);o.start(n);o.stop(n+.22);}
    else if(t==='click'){o.frequency.setValueAtTime(660,n);g.gain.setValueAtTime(.04,n);g.gain.exponentialRampToValueAtTime(.001,n+.07);o.start(n);o.stop(n+.07);}
    else if(t==='win'){[523,659,784,1047].forEach((f,i)=>{const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.frequency.value=f;g2.gain.setValueAtTime(.1,n+i*.1);g2.gain.exponentialRampToValueAtTime(.001,n+i*.1+.28);o2.start(n+i*.1);o2.stop(n+i*.1+.28);});}
  }catch(e){}
}
function haptic(p){ if(navigator.vibrate) navigator.vibrate(p); }
document.addEventListener('touchstart',()=>gC(),{once:true,passive:true});
document.addEventListener('click',()=>gC(),{once:true});

// BOOT
renderHome();
</script>
